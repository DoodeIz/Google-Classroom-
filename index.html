<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>google classroom- | Unblocked Games</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-[#0A0A0A] text-white selection:bg-emerald-500 selection:text-black min-h-screen">

    <!-- Header -->
    <header class="sticky top-0 z-40 bg-[#0A0A0A]/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.reload()">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="gamepad-2" class="w-5 h-5 text-black"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tighter uppercase italic">google classroom-</h1>
            </div>

            <div class="flex-1 max-w-md relative">
                <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-white/40"></i>
                <input
                    type="text"
                    id="searchInput"
                    placeholder="Search games..."
                    class="w-full bg-white/5 border border-white/10 rounded-full py-2 pl-10 pr-4 focus:outline-none focus:border-emerald-500/50 transition-colors text-sm"
                >
            </div>

            <div class="hidden md:flex items-center gap-6 text-sm font-medium text-white/60">
                <button class="hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="trophy" class="w-4 h-4"></i> Leaderboard
                </button>
                <button class="hover:text-white transition-colors flex items-center gap-2">
                    <i data-lucide="flame" class="w-4 h-4"></i> Trending
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <!-- Category Filter -->
        <div id="categoryContainer" class="flex items-center gap-2 mb-8 overflow-x-auto pb-2 no-scrollbar">
            <!-- Categories will be injected here -->
        </div>

        <!-- Game Grid -->
        <div id="gameGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Games will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden py-20 text-center">
            <div class="w-16 h-16 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="search" class="w-8 h-8 text-white/20"></i>
            </div>
            <h3 class="text-xl font-bold mb-2">No games found</h3>
            <p class="text-white/40">Try adjusting your search or category filter.</p>
        </div>
    </main>

    <!-- Game Modal -->
    <div id="gameModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 md:p-8 bg-black/95 backdrop-blur-sm">
        <div class="relative w-full max-w-6xl aspect-video bg-[#141414] rounded-3xl overflow-hidden border border-white/10 shadow-2xl flex flex-col">
            <!-- Modal Header -->
            <div class="flex items-center justify-between px-6 py-4 border-b border-white/10 bg-[#1A1A1A]">
                <div class="flex items-center gap-4">
                    <div id="modalIcon" class="w-10 h-10 rounded-xl overflow-hidden border border-white/10">
                        <img src="" class="w-full h-full object-cover">
                    </div>
                    <div>
                        <h2 id="modalTitle" class="text-lg font-bold leading-none mb-1"></h2>
                        <p id="modalCategory" class="text-xs text-white/40"></p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="toggleFullScreen()" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-white/60 hover:text-white">
                        <i data-lucide="maximize-2" class="w-5 h-5"></i>
                    </button>
                    <button onclick="closeGame()" class="p-2 hover:bg-red-500/20 rounded-lg transition-colors text-white/60 hover:text-red-500">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>

            <!-- Game Iframe -->
            <div class="flex-1 bg-black relative">
                <iframe id="gameIframe" src="" class="w-full h-full border-none" allowfullscreen></iframe>
            </div>

            <!-- Modal Footer -->
            <div class="px-6 py-4 bg-[#1A1A1A] border-t border-white/10 flex items-center justify-between">
                <p id="modalDescription" class="text-sm text-white/60 max-w-2xl truncate"></p>
                <div class="flex items-center gap-4">
                    <button class="text-xs font-bold uppercase tracking-widest text-emerald-500 hover:text-emerald-400 transition-colors">Report Bug</button>
                    <button onclick="toggleFullScreen()" class="bg-emerald-500 text-black px-6 py-2 rounded-full text-sm font-bold hover:bg-emerald-400 transition-colors">Full Screen</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-12 mt-20">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="flex items-center gap-2 opacity-40">
                <i data-lucide="gamepad-2" class="w-5 h-5"></i>
                <span class="text-sm font-bold uppercase tracking-tighter italic">google classroom-</span>
            </div>
            <div class="flex gap-8 text-xs font-medium text-white/40 uppercase tracking-widest">
                <a href="#" class="hover:text-white transition-colors">Terms</a>
                <a href="#" class="hover:text-white transition-colors">Privacy</a>
                <a href="#" class="hover:text-white transition-colors">DMCA</a>
                <a href="#" class="hover:text-white transition-colors">Contact</a>
            </div>
            <p class="text-xs text-white/20">© 2024 google classroom-. All rights reserved.</p>
        </div>
    </footer>

    <script src="src/script.js"></script>
</body>
</html>
